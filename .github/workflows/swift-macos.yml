name: Swift (macOS)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  swift-macos:
    name: Swift (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: cd Packages && swift build && swift test
